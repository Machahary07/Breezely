<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Breezely Sidebar</title>

    <!-- Google Fonts: Comfortaa for Headings, Poppins for Subheadings & Body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="sidebar.css" />

    <!-- Markdown Parser & Sanitizer -->
    <script src="vendor/marked.min.js"></script>
    <script src="vendor/purify.min.js"></script>

    <!-- Code Highlighting -->
    <link rel="stylesheet" href="vendor/github-dark.min.css" />
    <script src="vendor/highlight.min.js"></script>
  </head>

  <body>
    <div class="container">
      <header class="header">
        <div class="header-content">
          <div class="logo">
            <img src="breezely-logo-white.svg" alt="Breezely Logo" width="24" height="24" />
            <span>Breezely</span>
          </div>
          <div class="header-actions">

            <div class="premium-dropdown header-dropdown" data-target="translate-lang">
              <div class="premium-dropdown-btn" title="Translate Page">
                <span class="premium-dropdown-val">Default</span>
                <svg class="chevron" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="18 15 12 9 6 15"></polyline>
                </svg>
              </div>
              <div class="premium-dropdown-menu">
                <div class="premium-dropdown-item active" data-value="">Default</div>
                <div class="premium-dropdown-item" data-value="as">Assamese</div>
                <div class="premium-dropdown-item" data-value="bn">Bengali</div>
                <div class="premium-dropdown-item" data-value="brx">Bodo</div>
                <div class="premium-dropdown-item" data-value="hi">Hindi</div>
                <div class="premium-dropdown-item" data-value="en">English</div>
              </div>
              <select id="translate-lang" style="display:none;">
                <option value="">Default</option>
                <option value="as">Assamese</option>
                <option value="bn">Bengali</option>
                <option value="brx">Bodo</option>
                <option value="hi">Hindi</option>
                <option value="en">English</option>
              </select>
            </div>

            <button id="sidebar-refresh-btn" class="icon-btn tool-btn" title="Refresh Breezely">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 4v6h-6"></path>
                <path d="M1 20v-6h6"></path>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
              </svg>
            </button>
            
            <div id="auth-status" class="auth-status">
              <!-- Profile image will be injected here -->
            </div>
          </div>
        </div>
      </header>

      <div class="main-content">
        <div id="chat-container" class="chat-container">
          <div class="welcome-screen">
            <div class="welcome-icon">
              <img src="breezely-logo-white.svg" alt="Breezely Logo" width="64" height="64" />
            </div>
            <h2>Let's Breeze</h2>
            <p>Your personal web agent.</p>
            <p class="subtitle">Navigate, translate, and automate with ease.</p>
          </div>
        </div>
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <textarea id="chat-input" placeholder="Type your request here..." rows="1" autofocus></textarea>
          
          <div class="input-tools">
            <div class="tools-left">
              <button class="icon-btn action-icon" title="Attachment">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="12" y1="5" x2="12" y2="19"></line>
                  <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
              </button>

              <div class="premium-dropdown" data-target="speech-lang">
                <div class="premium-dropdown-btn" title="Speech Language">
                  <svg class="chevron" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
                  <span class="premium-dropdown-val">EN</span>
                </div>
                <div class="premium-dropdown-menu">
                  <div class="premium-dropdown-item active" data-value="en-US">EN</div>
                  <div class="premium-dropdown-item" data-value="as-IN">AS</div>
                  <div class="premium-dropdown-item" data-value="bn-IN">BN</div>
                  <div class="premium-dropdown-item" data-value="hi-IN">HI</div>
                </div>
                <select id="speech-lang" style="display:none;">
                  <option value="en-US" selected>EN</option>
                  <option value="as-IN">AS</option>
                  <option value="bn-IN">BN</option>
                  <option value="hi-IN">HI</option>
                </select>
              </div>

              <div class="premium-dropdown" data-target="model-select">
                <div class="premium-dropdown-btn" title="AI Model">
                  <svg class="chevron" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
                  <span class="premium-dropdown-val">Gemini</span>
                </div>
                <div class="premium-dropdown-menu">
                  <div class="premium-dropdown-item active" data-value="gemini">Gemini</div>
                  <div class="premium-dropdown-item" data-value="claude">Claude</div>
                  <div class="premium-dropdown-item" data-value="openai">OpenAI</div>
                </div>
                <select id="model-select" style="display:none;">
                  <option value="gemini" selected>Gemini</option>
                  <option value="claude">Claude</option>
                  <option value="openai">OpenAI</option>
                </select>
              </div>
              <span id="key-status" class="key-indicator no-key" title="No API key set"></span>
            </div>

            <div class="tools-right">
              <button id="mic-btn" class="icon-btn tool-btn" title="Speech to Text">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                  <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                  <line x1="12" y1="19" x2="12" y2="22"></line>
                </svg>
              </button>

              <div id="mic-equalizer" class="equalizer hidden">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
              </div>

              <button id="send-btn" class="send-btn">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="5" y1="12" x2="19" y2="12"></line>
                  <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="sidebar.js"></script>
  </body>
</html>
