<aside class="sidebar-container" #sidebarElement [class.collapsed]="collapsed">
  <div class="sidebar-inner">
    <!-- Header: Brand + Toggle -->
    <div class="sidebar-header">
      <div class="brand-logo" [class.hidden]="collapsed">
        <span class="brand-text">Breezely</span>
      </div>
      <button class="sidebar-toggle" (click)="onToggle()" [title]="collapsed ? 'Expand' : 'Collapse'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/>
        </svg>
      </button>
    </div>

    <!-- Quick Actions (New Chat, Search, Customize) -->
    <div class="sidebar-quick">
      <app-sidebar-icon-btn label="New Chat" icon="plus" [showLabel]="!collapsed" (clicked)="onNewChat()"></app-sidebar-icon-btn>
      <app-sidebar-icon-btn label="Search" icon="search" [showLabel]="!collapsed" (clicked)="onSearch()"></app-sidebar-icon-btn>
      <app-sidebar-icon-btn label="Customize" icon="briefcase" [active]="customizeActive" [showLabel]="!collapsed" (clicked)="onCustomize()"></app-sidebar-icon-btn>
    </div>

    <!-- Nav Tabs (Chats, Flows, Playbooks) -->
    <div class="sidebar-nav">
      <app-sidebar-icon-btn label="Chats" icon="chat" [active]="activeTab === 'chats'" [showLabel]="!collapsed" (clicked)="setTab('chats')"></app-sidebar-icon-btn>
      <app-sidebar-icon-btn label="Flows" icon="flow" [active]="activeTab === 'flows'" [showLabel]="!collapsed" (clicked)="setTab('flows')"></app-sidebar-icon-btn>
      <app-sidebar-icon-btn label="Playbooks" icon="book" [active]="activeTab === 'playbooks'" [showLabel]="!collapsed" (clicked)="setTab('playbooks')"></app-sidebar-icon-btn>
    </div>

    <!-- Recents List -->
    <div class="sidebar-list" [class.hidden]="collapsed">
      <div class="list-header" (click)="recentsOpen = !recentsOpen">
        <span class="list-label">Recents</span>
        <svg class="chevron" [class.collapsed]="!recentsOpen" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <div class="list-content" *ngIf="recentsOpen">
        <div class="chat-item" *ngFor="let chat of recentChats" [class.active]="chat.id === activeChatId" (click)="onSelectChat(chat.id)">
          <span class="chat-item-text">{{ chat.title }}</span>
        </div>
        <div class="empty-list" *ngIf="recentChats.length === 0">
          No recent chats
        </div>
      </div>
    </div>

    <!-- Footer: User -->
    <div class="sidebar-footer" *ngIf="user">
      <div class="user-block">
        <app-user-avatar [photoURL]="user.photoURL" [name]="user.displayName || user.email" [size]="32"></app-user-avatar>
        <div class="user-info" [class.hidden]="collapsed">
          <span class="user-name">{{ user.displayName || 'Breezely User' }}</span>
          <span class="user-plan">Free plan</span>
        </div>
        <button class="logout-btn" (click)="onLogout()" [class.hidden]="collapsed" title="Log out">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</aside>
