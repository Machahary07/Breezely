<section class="hero" id="hero">
  <!-- Background Video -->
  <div class="hero__bg">
    <video
      #heroVideo
      class="hero__video"
      autoplay
      loop
      muted
      playsinline
      preload="auto"
      aria-hidden="true"
    >
      <source src="https://integratedbiosciences.com/wp-content/uploads/2025/10/integrated-loop-optimized.mp4" type="video/mp4" />
    </video>
    <div class="hero__overlay"></div>
  </div>

  <!-- Global Navbar -->
  <app-navbar></app-navbar>

  <!-- Hero Content -->
  <div class="hero__content">
    <h1 class="hero__heading" id="hero-heading">
      <span class="hero__heading-line">You think it.</span>
      <span class="hero__heading-line">We <span class="hero__heading-accent">Breeze</span> it.</span>
    </h1>
    <app-download-extension-btn (downloadClick)="showModal = true"></app-download-extension-btn>
  </div>

  <!-- Bottom Bar -->
  <div class="hero__bottom">
    <p class="hero__tagline" id="hero-tagline">
      <span class="tagline-line">We transform natural language into real browser actions</span>
      <span class="tagline-line">with generative AI, cloud orchestration, and intelligent automation for everyone.</span>
    </p>
    <app-cta-button text="Let's Breeze" link="#platform" id="cta-lets-breeze"></app-cta-button>
  </div>

  <!-- Download Modal -->
  <app-download-modal [isVisible]="showModal" (close)="showModal = false"></app-download-modal>
</section>
