<main class="page-container">
  <!-- Full background video behind everything -->
  <video autoplay loop muted playsinline class="bg-video">
    <source src="https://integratedbiosciences.com/wp-content/uploads/2025/10/integrated-loop-optimized.mp4" type="video/mp4" />
  </video>
  <!-- Optional overlay if video is too bright -->
  <div class="bg-overlay"></div>

  <!-- Loading State (Overrides everything when verifying auth) -->
  <div class="loading-state" *ngIf="isLoading">
    <div class="spinner"></div>
    <p>Loading your workspace...</p>
  </div>

  <!-- Centered Glass Modal -->
  <div class="glass-modal" *ngIf="!isLoading">
    
    <!-- Left Pane -->
    <section class="modal-left">
      <div class="brand">
        <!-- Re-using white logo from public -->
        <img src="breezely-logo-white.svg" alt="Breezely Logo" class="logo">
        <h1 class="brand-name">Breezely</h1>
        <p class="brand-desc">
          Log in or create an account to manage your <br/>
          <strong>intelligent browser automation.</strong>
        </p>
      </div>
    </section>

    <!-- Right Pane -->
    <section class="modal-right">
      <div class="auth-header" *ngIf="step === 'email'">
        <h2 class="auth-title">Sign In</h2>
        <p class="auth-subtitle">Use your account to continue</p>
      </div>

      <div class="auth-form-container" *ngIf="step === 'email'">
        <!-- Google Social Button redesign -->
        <button class="social-btn align-center" (click)="continueWithGoogle()" type="button">
          <img src="https://www.svgrepo.com/show/303108/google-icon-logo.svg" alt="Google Logo" class="google-logo">
          Sign in with Google
        </button>

        <div class="auth-divider">
          <span>or</span>
        </div>

        <form class="auth-form" (ngSubmit)="sendMagicLink()">
          <!-- Email Input State -->
          <div class="input-wrapper animate-in fade-in">
            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
            <input type="email" placeholder="Email address" [(ngModel)]="email" name="email" class="custom-input" required autocomplete="email">
          </div>

          <!-- Dynamic Feedback State -->
          <div class="feedback-container" *ngIf="message">
            <p class="feedback-msg" [class.error]="isError">{{ message }}</p>
          </div>

          <button class="primary-btn" type="submit" [disabled]="isLoading">
            <span class="btn-text">{{ isLoading ? 'Processing...' : 'Continue with Email' }}</span>
            <svg *ngIf="!isLoading" class="btn-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
          </button>
        </form>
      </div>

      <!-- Magic Link Sent State -->
      <div class="auth-success-state animate-in fade-in" *ngIf="step === 'link-sent'">
        <div class="success-icon-wrapper">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--breezely-green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
          </svg>
        </div>
        <h3 class="success-title">Check Your Email!</h3>
        <p class="success-desc">We've sent a magic link to <strong>{{ email }}</strong>.<br/>Click the link inside to instantly sign in.</p>
        <button class="text-btn" (click)="step = 'email'">Back to login</button>
      </div>

<!-- Removed redundant sign up text -->
    </section>

  </div>
</main>
