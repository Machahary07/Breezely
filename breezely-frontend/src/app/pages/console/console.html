<div class="console-wrapper">
  
  <!-- Loading State -->
  <div class="loading-state" *ngIf="isLoading">
    <div class="spinner"></div>
    <p>Loading your workspace...</p>
  </div>

  <!-- Main Console Layout -->
  <div class="console-layout" *ngIf="!isLoading && user">
    
    <!-- Sidebar -->
    <app-sidebar 
      [collapsed]="sidebarCollapsed"
      [user]="user"
      [recentChats]="recentChats"
      [activeChatId]="activeChatId"
      (toggle)="onToggleSidebar()"
      (newChat)="onNewChat()"
      (search)="onSearch()"
      (logout)="onLogout()"
      (selectChat)="onSelectChat($event)"
    >
    </app-sidebar>

    <!-- Main Content Area -->
    <main class="console-main">
      
      <!-- Greeting and Input Area -->
      <section class="chat-section" *ngIf="!activeChatId">
        <app-chat-input 
          [userFirstname]="getFirstName()"
          [greeting]="getGreeting()"
          (sendMessage)="onSendMessage($event)"
        >
        </app-chat-input>
      </section>

      <!-- Placeholder for Chat Messages (if activeChatId) -->
      <section class="messages-section" *ngIf="activeChatId">
        <!-- Future: Chat Message List -->
        <div class="future-feature">
          <h3>Chat: {{ activeChatId }}</h3>
          <p>This is where your automation session with Breezely would appear.</p>
        </div>
      </section>

    </main>

  </div>

</div>
